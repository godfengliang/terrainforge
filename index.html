<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TerrainForge — 3D Procedural Terrain Generator</title>
<meta name="description" content="Generate stunning 3D terrain in your browser. Mountains, islands, forests with procedural noise. Day/night cycle, fly-through camera, screenshot export.">
<meta name="keywords" content="terrain generator, procedural terrain, 3D landscape, perlin noise, three.js, voxel, world generator">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://terrainforge-3d.surge.sh/">
<meta property="og:type" content="website">
<meta property="og:title" content="TerrainForge — 3D Procedural Terrain Generator">
<meta property="og:description" content="Generate stunning 3D terrain in your browser. Free, interactive, screenshot export.">
<meta property="og:url" content="https://terrainforge-3d.surge.sh/">
<meta name="twitter:card" content="summary_large_image">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;overflow:hidden;display:flex}
.sidebar{width:240px;background:#161b22;border-right:1px solid #21262d;overflow-y:auto;padding:16px;flex-shrink:0;display:flex;flex-direction:column;gap:12px}
.sidebar h1{font-size:16px;font-weight:800}.sidebar h1 span{color:#58a6ff}
.sidebar p{font-size:11px;color:#8b949e}
.ctrl{display:flex;flex-direction:column;gap:3px}
.ctrl label{font-size:11px;color:#8b949e;font-weight:600;display:flex;justify-content:space-between}
.ctrl label b{color:#e6edf3}
.ctrl input[type=range]{width:100%;accent-color:#58a6ff}
.ctrl input[type=number]{width:100%;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;padding:5px 8px;border-radius:4px;font-size:12px;font-family:inherit}
.presets{display:flex;gap:4px;flex-wrap:wrap}
.preset{padding:4px 10px;border-radius:4px;background:#21262d;border:1px solid #30363d;color:#c9d1d9;font-size:11px;cursor:pointer;font-weight:600}
.preset:hover{background:#30363d}
.preset.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.btn{padding:8px 14px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.btn-gen{background:#238636;color:#fff}.btn-gen:hover{background:#2ea043}
.btn-ss{background:#21262d;color:#c9d1d9;border:1px solid #30363d}.btn-ss:hover{background:#30363d}
.divider{height:1px;background:#21262d;margin:4px 0}
canvas{flex:1;display:block}
.info{font-size:10px;color:#484f58;line-height:1.4}
@media(max-width:700px){.sidebar{width:100%;height:auto;max-height:35vh;border-right:none;border-bottom:1px solid #21262d}}
</style>
</head>
<body>
<div class="sidebar">
  <div><h1>Terrain<span>Forge</span></h1><p>3D Procedural Terrain Generator</p></div>
  <div class="divider"></div>
  <div class="ctrl"><label>Height <b id="vH">8</b></label><input type="range" id="sH" min="1" max="20" value="8" step="0.5"></div>
  <div class="ctrl"><label>Roughness <b id="vR">3</b></label><input type="range" id="sR" min="1" max="8" value="3" step="1"></div>
  <div class="ctrl"><label>Scale <b id="vS">0.04</b></label><input type="range" id="sS" min="0.01" max="0.1" value="0.04" step="0.005"></div>
  <div class="ctrl"><label>Water Level <b id="vW">0.3</b></label><input type="range" id="sW" min="0" max="0.8" value="0.3" step="0.05"></div>
  <div class="ctrl"><label>Trees <b id="vT">150</b></label><input type="range" id="sT" min="0" max="500" value="150" step="10"></div>
  <div class="ctrl"><label>Sun Angle <b id="vSun">45</b></label><input type="range" id="sSun" min="0" max="180" value="45" step="5"></div>
  <div class="ctrl"><label>Seed</label><input type="number" id="seed" value="42"></div>
  <div class="divider"></div>
  <label style="font-size:11px;color:#8b949e;font-weight:600">Presets</label>
  <div class="presets">
    <button class="preset" data-p="mountains">Mountains</button>
    <button class="preset" data-p="islands">Islands</button>
    <button class="preset" data-p="plains">Plains</button>
    <button class="preset" data-p="canyon">Canyon</button>
    <button class="preset" data-p="tundra">Tundra</button>
    <button class="preset" data-p="desert">Desert</button>
  </div>
  <button class="btn btn-gen" id="btnGen">Generate Terrain</button>
  <button class="btn btn-ss" id="btnSS">Screenshot (PNG)</button>
  <div class="divider"></div>
  <div class="info">Drag to rotate &bull; Scroll to zoom &bull; Right-drag to pan<br>All rendering runs in your browser via WebGL + Three.js</div>
</div>
<script>
(function(){
const $=id=>document.getElementById(id);
let scene,camera,renderer,terrainGroup,sun,ambient,water;
let seed=42;

// Seeded PRNG
function srand(s){seed=s;}
function rand(){seed=(seed*16807+7)%2147483647;return(seed&0x7fffffff)/2147483647;}

// Perlin noise
let perm=new Uint8Array(512);
function initNoise(){
  const p=[];for(let i=0;i<256;i++)p[i]=i;
  for(let i=255;i>0;i--){const j=Math.floor(rand()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
  for(let i=0;i<512;i++)perm[i]=p[i&255];
}
function fade(t){return t*t*t*(t*(t*6-15)+10);}
function lerp(a,b,t){return a+t*(b-a);}
function grad2(h,x,y){const v=h&3;return((v&1)?-x:x)+((v&2)?-y:y);}
function perlin(x,y){
  const X=Math.floor(x)&255,Y=Math.floor(y)&255;
  x-=Math.floor(x);y-=Math.floor(y);
  const u=fade(x),v=fade(y);
  const A=perm[X]+Y,B=perm[X+1]+Y;
  return lerp(lerp(grad2(perm[A],x,y),grad2(perm[B],x-1,y),u),lerp(grad2(perm[A+1],x,y-1),grad2(perm[B+1],x-1,y-1),u),v);
}
function fbm(x,y,oct){let s=0,a=1,f=1,m=0;for(let i=0;i<oct;i++){s+=perlin(x*f,y*f)*a;m+=a;a*=0.5;f*=2.0;}return s/m;}

// Init Three.js
const container=document.createElement('div');
container.style.cssText='flex:1;position:relative';
document.body.appendChild(container);

scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x88bbee,0.008);
scene.background=new THREE.Color(0x88bbee);

camera=new THREE.PerspectiveCamera(55,1,0.1,500);
renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
container.appendChild(renderer.domElement);

sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);
scene.add(sun);
ambient=new THREE.AmbientLight(0x446688,0.5);
scene.add(ambient);

terrainGroup=new THREE.Group();
scene.add(terrainGroup);

// Camera orbit
let camTheta=Math.PI*0.25,camPhi=Math.PI*0.35,camDist=35;
let camTarget=new THREE.Vector3(0,0,0);
let isDrag=false,isPan=false,lastM={x:0,y:0};

function updateCam(){
  camera.position.set(
    camTarget.x+camDist*Math.sin(camPhi)*Math.cos(camTheta),
    camTarget.y+camDist*Math.cos(camPhi),
    camTarget.z+camDist*Math.sin(camPhi)*Math.sin(camTheta)
  );
  camera.lookAt(camTarget);
}

renderer.domElement.addEventListener('mousedown',e=>{
  if(e.button===2)isPan=true;else isDrag=true;
  lastM={x:e.clientX,y:e.clientY};
});
window.addEventListener('mouseup',()=>{isDrag=false;isPan=false;});
window.addEventListener('mousemove',e=>{
  if(!isDrag&&!isPan)return;
  const dx=e.clientX-lastM.x,dy=e.clientY-lastM.y;
  if(isDrag){camTheta-=dx*0.008;camPhi=Math.max(0.05,Math.min(Math.PI-0.05,camPhi+dy*0.008));}
  if(isPan){
    const right=new THREE.Vector3();camera.getWorldDirection(right);right.y=0;right.normalize();right.cross(camera.up);
    camTarget.add(right.multiplyScalar(-dx*0.05));
    camTarget.y+=dy*0.05;
  }
  lastM={x:e.clientX,y:e.clientY};
});
renderer.domElement.addEventListener('wheel',e=>{camDist=Math.max(5,Math.min(80,camDist+e.deltaY*0.03));},{passive:true});
renderer.domElement.addEventListener('contextmenu',e=>e.preventDefault());

// Touch support
let lastTouch=null;
renderer.domElement.addEventListener('touchstart',e=>{if(e.touches.length===1)lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};});
renderer.domElement.addEventListener('touchmove',e=>{
  if(!lastTouch||e.touches.length!==1)return;
  const dx=e.touches[0].clientX-lastTouch.x,dy=e.touches[0].clientY-lastTouch.y;
  camTheta-=dx*0.008;camPhi=Math.max(0.05,Math.min(Math.PI-0.05,camPhi+dy*0.008));
  lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};
});
renderer.domElement.addEventListener('touchend',()=>lastTouch=null);

function getHeight(x,z,hs,freq,oct){
  return fbm(x*freq,z*freq,oct)*hs;
}

function terrainColor(h,wl,hs){
  const t=hs>0?h/hs:0;
  const wl2=wl;
  if(t<wl2-0.1)return new THREE.Color(0.08,0.22,0.45);
  if(t<wl2-0.02)return new THREE.Color(0.12,0.32,0.55);
  if(t<wl2+0.02)return new THREE.Color(0.76,0.7,0.5);
  if(t<wl2+0.2)return new THREE.Color(0.22,0.55,0.12);
  if(t<wl2+0.35)return new THREE.Color(0.14,0.38,0.08);
  if(t<wl2+0.5)return new THREE.Color(0.4,0.35,0.28);
  if(t<wl2+0.7)return new THREE.Color(0.55,0.5,0.45);
  return new THREE.Color(0.92,0.92,0.95);
}

function generate(){
  srand(parseInt($('seed').value)||42);
  initNoise();

  // Clear
  while(terrainGroup.children.length){
    const c=terrainGroup.children[0];
    terrainGroup.remove(c);
    if(c.geometry)c.geometry.dispose();
    if(c.material)c.material.dispose();
  }

  const hs=parseFloat($('sH').value);
  const oct=parseInt($('sR').value);
  const freq=parseFloat($('sS').value);
  const wl=parseFloat($('sW').value);
  const treeCount=parseInt($('sT').value);
  const sz=80,seg=150;

  // Terrain
  const geo=new THREE.PlaneGeometry(sz,sz,seg,seg);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position;
  const cols=new Float32Array(pos.count*3);

  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),z=pos.getZ(i);
    const h=getHeight(x,z,hs,freq,oct);
    pos.setY(i,h);
    const c=terrainColor(h,wl,hs);
    cols[i*3]=c.r;cols[i*3+1]=c.g;cols[i*3+2]=c.b;
  }
  geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
  geo.computeVertexNormals();
  const mat=new THREE.MeshLambertMaterial({vertexColors:true});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.receiveShadow=true;
  terrainGroup.add(mesh);

  // Water
  const wGeo=new THREE.PlaneGeometry(sz*1.5,sz*1.5);
  wGeo.rotateX(-Math.PI/2);
  const wMat=new THREE.MeshPhongMaterial({color:0x1a6090,transparent:true,opacity:0.7,shininess:100});
  water=new THREE.Mesh(wGeo,wMat);
  water.position.y=wl*hs;
  terrainGroup.add(water);

  // Trees
  if(treeCount>0){
    const tGeo=new THREE.CylinderGeometry(0.08,0.15,0.7,5);
    const tMat=new THREE.MeshLambertMaterial({color:0x4a2f1b});
    const trunks=new THREE.InstancedMesh(tGeo,tMat,treeCount);
    trunks.castShadow=true;

    const lGeo=new THREE.ConeGeometry(0.45,1.1,6);
    const lMat=new THREE.MeshLambertMaterial({color:0x1a6a1a});
    const leaves=new THREE.InstancedMesh(lGeo,lMat,treeCount);
    leaves.castShadow=true;

    const dummy=new THREE.Object3D();
    let idx=0;
    for(let i=0;i<treeCount*3&&idx<treeCount;i++){
      const x=(rand()-0.5)*sz*0.9;
      const z=(rand()-0.5)*sz*0.9;
      const h=getHeight(x,z,hs,freq,oct);
      const threshold=wl*hs;
      if(h>threshold+0.3&&h<threshold+0.35*hs){
        const s=0.6+rand()*0.8;
        dummy.position.set(x,h+0.35*s,z);
        dummy.scale.setScalar(s);
        dummy.rotation.y=rand()*Math.PI*2;
        dummy.updateMatrix();
        trunks.setMatrixAt(idx,dummy.matrix);
        dummy.position.y=h+(0.35+0.55)*s;
        dummy.updateMatrix();
        leaves.setMatrixAt(idx,dummy.matrix);
        idx++;
      }
    }
    trunks.count=idx;leaves.count=idx;
    trunks.instanceMatrix.needsUpdate=true;
    leaves.instanceMatrix.needsUpdate=true;
    terrainGroup.add(trunks);terrainGroup.add(leaves);
  }

  updateCam();
}

// Sun
function updateSun(){
  const angle=parseFloat($('sSun').value)*Math.PI/180;
  const r=40;
  sun.position.set(Math.cos(angle)*r,Math.sin(angle)*r+5,10);
  const t=Math.sin(angle);
  sun.intensity=Math.max(0.3,t*1.5);
  ambient.intensity=Math.max(0.15,0.2+t*0.4);
  const sky=t>0.1?new THREE.Color(0x88bbee):t>-0.1?new THREE.Color(0xcc7744):new THREE.Color(0x112244);
  scene.background=sky;scene.fog.color=sky;
  if(t<0.2){sun.color.setHex(t>0?0xffaa44:0x4466aa);}else{sun.color.setHex(0xffffff);}
}

// Slider labels
['H','R','S','W','T','Sun'].forEach(k=>{
  $('s'+k).addEventListener('input',()=>{$('v'+k).textContent=$('s'+k).value;});
});
$('sSun').addEventListener('input',updateSun);

// Presets
const PR={
  mountains:{H:15,R:5,S:0.03,W:0.25,T:100,seed:42},
  islands:{H:6,R:4,S:0.04,W:0.55,T:200,seed:77},
  plains:{H:3,R:2,S:0.02,W:0.15,T:300,seed:33},
  canyon:{H:12,R:6,S:0.06,W:0.1,T:30,seed:88},
  tundra:{H:5,R:3,S:0.05,W:0.35,T:50,seed:55},
  desert:{H:4,R:2,S:0.03,W:0.0,T:0,seed:99}
};
document.querySelectorAll('.preset').forEach(b=>{
  b.addEventListener('click',()=>{
    const p=PR[b.dataset.p];if(!p)return;
    $('sH').value=p.H;$('sR').value=p.R;$('sS').value=p.S;$('sW').value=p.W;$('sT').value=p.T;$('seed').value=p.seed;
    ['H','R','S','W','T'].forEach(k=>{$('v'+k).textContent=$('s'+k).value;});
    document.querySelectorAll('.preset').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    generate();
  });
});

$('btnGen').addEventListener('click',generate);

$('btnSS').addEventListener('click',()=>{
  renderer.render(scene,camera);
  const a=document.createElement('a');
  a.download='terrainforge-'+Date.now()+'.png';
  a.href=renderer.domElement.toDataURL('image/png');
  a.click();
});

// Resize
function onResize(){
  const w=container.clientWidth,h=container.clientHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);
}
window.addEventListener('resize',onResize);

// Animate
let time=0;
function animate(){
  requestAnimationFrame(animate);
  time+=0.01;
  if(water)water.position.y=parseFloat($('sW').value)*parseFloat($('sH').value)+Math.sin(time)*0.05;
  renderer.render(scene,camera);
}

onResize();updateSun();
document.querySelector('[data-p="islands"]').click();
animate();
})();
</script>
</body>
</html>
